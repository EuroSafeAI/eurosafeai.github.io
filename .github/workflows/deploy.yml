name: Deploy to GitHub Pages

# Required repo secrets:
#   CERT_SECRET   — PRNG seed for deterministic certificate stamp placement.
#                   Must remain stable across deploys, otherwise every PDF's
#                   stamp position and file bytes change.
#
# Required GitHub Pages settings (Settings → Pages):
#   Source: "GitHub Actions" (not "branch")
#   Custom domain: safe.eu (matches CNAME written below)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Periodic rebuild so the /events page picks up new past events from
  # Luma without anyone touching this repo. See scripts/SYNC-LUMA.md.
  # Every 6h is a balance between freshness (~3h average staleness) and
  # CI minutes (~10 min/day).
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify stamp fingerprint
        # Pins the cert visual identity. If stamp.png is re-exported with even
        # a one-byte change, every PDF's bytes change too. CI catches that here.
        run: |
          actual=$(shasum -a 256 public/images/stamp.png | awk '{print $1}')
          expected="d934c0f8303a01c745519587df62d7f222c5fce8e7f4dd07a98634e63c5a2c6c"
          if [ "$actual" != "$expected" ]; then
            echo "::error::public/images/stamp.png hash drifted (got $actual, want $expected)"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Generate certificates
        # Produces public/certificate/<id>.pdf for every model in
        # src/data/models.json. Dimensions without a score (today: `hist` on
        # every model) render as a neutral gray "—" card in the PDF — same
        # visual treatment as the leaderboard's History column. As hist scores
        # land in the data, those cards start showing real grades automatically.
        env:
          CERT_SECRET: ${{ secrets.CERT_SECRET }}
        run: npm run certs

      - name: Sync Luma events
        # Fetches the latest event list from Luma's API and writes
        # src/data/events.json. The file is gitignored — regenerated fresh
        # on every deploy and every 6h cron run. Failure here intentionally
        # breaks the build rather than shipping stale data silently. See
        # scripts/SYNC-LUMA.md for the contract.
        run: npm run sync:luma

      - name: Build
        # Must run AFTER `npm run certs` (PDFs land in public/certificate/)
        # and AFTER `npm run sync:luma` (events.json is bundled by Vite).
        run: npm run build

      - name: SPA fallback (copy index.html to 404.html)
        # GitHub Pages serves 404.html for any path not present on disk.
        # Mirroring index.html lets react-router pick up the route on hard refresh.
        run: cp ./dist/index.html ./dist/404.html

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Add CNAME
        run: echo "safe.eu" > ./dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy once
        # Pages intermittently rejects deployments with a generic
        # "Deployment failed, try again later" seconds after creation
        # (seen 2026-07-02 with identical artifacts succeeding minutes
        # apart). One retry absorbs the transient case.
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
